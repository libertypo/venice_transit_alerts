name: Fetch ACTV Alerts

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: fetch-alerts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch ACTV alerts from Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ACTV_CHANNEL_ID: ${{ vars.ACTV_CHANNEL_ID }}
          DEBUG_TELEGRAM_UPDATES: ${{ vars.DEBUG_TELEGRAM_UPDATES }}
        run: |
          echo "[INFO] Workflow revision: actv-alerts-debug-2"
          echo "[INFO] Using ACTV_CHANNEL_ID=${ACTV_CHANNEL_ID}"
          python -u fetch_alerts.py

      - name: Commit and push disruptions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save generated files, reset to latest remote, restore — guarantees fast-forward
          cp disruptions.json /tmp/disruptions.json
          cp offset.txt /tmp/offset.txt 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/disruptions.json disruptions.json
          cp /tmp/offset.txt offset.txt 2>/dev/null || true
          git add disruptions.json offset.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update disruptions $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin main
          fi
