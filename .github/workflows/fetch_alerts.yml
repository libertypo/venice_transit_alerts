name: Fetch ACTV Alerts

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: fetch-alerts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch ACTV alerts from Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ACTV_CHANNEL_ID: ${{ vars.ACTV_CHANNEL_ID }}
          DEBUG_TELEGRAM_UPDATES: ${{ vars.DEBUG_TELEGRAM_UPDATES }}
        run: |
          echo "[INFO] Workflow revision: actv-alerts-debug-4"
          echo "[INFO] Using ACTV_CHANNEL_ID=${ACTV_CHANNEL_ID}"
          echo "[INFO] Token length: ${#TELEGRAM_BOT_TOKEN}"
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" | python -c "import sys,json; d=json.load(sys.stdin); r=d.get('result',{}); print(f'[INFO] Bot in Actions: id={r.get(\"id\")} username={r.get(\"username\")!r} ok={d.get(\"ok\")}')"
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" | python -c "import sys,json; d=json.load(sys.stdin); r=d.get('result',{}); url=r.get('url',''); print(f'[INFO] Webhook URL: {url!r} (empty=good, non-empty=problem)')"
          python -u fetch_alerts.py

      - name: Commit and push disruptions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save generated files, reset to latest remote, restore — guarantees fast-forward
          cp disruptions.json /tmp/disruptions.json
          cp offset.txt /tmp/offset.txt 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/disruptions.json disruptions.json
          cp /tmp/offset.txt offset.txt 2>/dev/null || true
          git add disruptions.json offset.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update disruptions $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin main
          fi
